<div class="flex items-center justify-center min-h-[calc(100vh-64px)]">
  <div class="card bg-base-100 w-full max-w-md shadow-xl border border-base-300">
    <div class="card-body gap-6">
      
      <div class="text-center">
        <h2 class="text-3xl font-bold text-indigo-400 font-sans">Welcome Back</h2>
        <p class="text-sm text-gray-600 mt-2">Please log in to your account.</p>
      </div>

      <form class="flex flex-col gap-4">
        
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium">Email Address</span>
          </label>
          <input type="email" placeholder="john@example.com" class="input input-bordered input-neutral rounded-md w-full focus:outline-offset-1 focus:border-indigo-500 focus:outline-indigo-500" required />
        </div>

        <div class="form-control">
          <div class="flex justify-between items-center">
            <label class="label">
              <span class="label-text font-medium">Password</span>
            </label>
          </div>
          <input type="password" placeholder="••••••••" class="input input-bordered input-neutral rounded-md w-full focus:outline-offset-1 focus:border-indigo-500 focus:outline-indigo-500" required />
        </div>

        <div class="form-control mt-2">
          <button type="submit" class="btn bg-indigo-600 hover:bg-indigo-700 text-white border-none rounded-md w-full tracking-wide uppercase">
            Log In
          </button>
        </div>

      </form>

      <div class="text-center text-sm text-base-content/70 mt-2">
        Don't have an account? 
        <a class="text-indigo-400 font-semibold no-underline hover:underline cursor-pointer ml-1" routerLink="/auth/register">Register here</a>
      </div>

    </div>
  </div>
</div>
